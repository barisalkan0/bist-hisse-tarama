name: IP probe (gecici)

# Amac: Is Yatirim'in GitHub runner (veri-merkezi) IP'sinden veri verip vermedigini test et.
# Sadece elle calistirilir. Basariliysa bu dosya silinir, asil update-data.yml eklenir.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas numpy requests
      - name: Is Yatirim erisim testi
        run: |
          python - <<'PY'
          from datetime import date, timedelta
          from data.fetch import fetch_history
          for sym in ("TUPRS", "BIMAS", "THYAO"):
              try:
                  df = fetch_history(sym, date.today() - timedelta(days=15), date.today())
                  n = 0 if df is None else len(df)
                  print(f"{sym}: ROWS={n}")
                  if df is not None and n:
                      print(df.tail(3).to_string())
              except Exception as e:
                  print(f"{sym}: HATA -> {type(e).__name__}: {e}")
          PY
